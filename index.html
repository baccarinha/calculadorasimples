<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;

            /* Gradiente rosa e azul */
            background: linear-gradient(135deg, #ff9ae6, #7aa8ff);
        }
footer {
    width: 100%;
    text-align: center;
    padding: 10px;
    background: transparent;
    color: #333;
    font-size: 14px;
}
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        h2 {
            margin-bottom: 20px;
            color: #6a0dad;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        input:focus {
            border-color: #7aa8ff;
            outline: none;
        }

        button {
            padding: 10px 15px;
            margin: 10px 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-somar {
            background: #ff66cc;
            color: white;
        }

        .btn-somar:hover {
            background: #e055b3;
        }

        .btn-multiplicar {
            background: #4d79ff;
            color: white;
        }

        .btn-multiplicar:hover {
            background: #3a63d8;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Calculadora 💖</h2>

        <input type="number" id="num1" placeholder="Primeiro número">
        <input type="number" id="num2" placeholder="Segundo número">

        <br>

        <button class="btn-somar" onclick="somar()">Somar</button>
        <button class="btn-multiplicar" onclick="multiplicar()">Multiplicar</button>
    </div>

    <script>
        function somar() {
            let n1 = parseFloat(document.getElementById("num1").value);
            let n2 = parseFloat(document.getElementById("num2").value);

            let resultado = n1 + n2;

            alert("Resultado da soma: " + resultado);
        }

        function multiplicar() {
            let n1 = parseFloat(document.getElementById("num1").value);
            let n2 = parseFloat(document.getElementById("num2").value);

            let resultado = n1 * n2;

            alert("Resultado da multiplicação: " + resultado);
        }
    </script> 
    <footer> © 2026 Calculadora | Jéssica Thais Baccaro</footer>

</body>
</html>
